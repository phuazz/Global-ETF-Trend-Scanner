name: Weekly History, Backtest & Event Study

on:
  schedule:
    # Saturday 08:00 UTC — after Friday US close, 2h after the daily refresh
    # so the two jobs do not push at the same instant.
    - cron: '0 8 * * 6'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch full price history
        # --max-age-hours=0 forces a refresh: checkout resets file mtimes, so the
        # default 168h skip guard would otherwise treat the committed history as fresh.
        run: node fetch_history.js --max-age-hours=0

      - name: Fetch attribution benchmarks (ACWI / URTH / VT)
        run: node fetch_benchmarks.js

      - name: Run backtest
        # Canonical config (matches backtest_results.json params and README).
        run: node backtest.js --startMonth=2005-01 --regimeMode=graduated --regimeScale=0.05 --weighting=equal --equityOnly

      - name: Benchmark-relative attribution
        # Non-fatal: a Python/statsmodels hiccup must not block the backtest +
        # event-study commit. The dashboard degrades gracefully without attribution.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas statsmodels
          python attribution.py
        continue-on-error: true

      - name: Event study
        run: node events.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ backtest_results.json events_results.json
          git diff --staged --quiet || git commit -m "Weekly history, backtest & event refresh $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
