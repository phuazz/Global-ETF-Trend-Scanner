name: Daily ETF Data Refresh

on:
  schedule:
    # Run at 06:00 UTC daily (14:00 SGT, after US market close + settlement)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ETF data
        run: node fetch_data.js

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --staged --quiet || git commit -m "Daily ETF data refresh $(date -u +%Y-%m-%d)"
          git push
